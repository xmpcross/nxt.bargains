<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600" role="img" aria-label="Marketplaces converging on one product">
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#eef3f0"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="48%" r="52%">
      <stop offset="0%" stop-color="#1556ee" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#1556ee" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#0d1b2a" flood-opacity="0.14"/>
    </filter>
  </defs>
  <ellipse cx="400" cy="290" rx="340" ry="280" fill="url(#glow)"/>
  <g stroke="#1556ee" stroke-opacity="0.45" stroke-width="2" fill="none">
    <path d="M150 130 C260 200 300 230 360 270"/>
    <path d="M660 120 C540 190 500 220 440 268"/>
    <path d="M110 360 C220 340 280 320 350 300"/>
    <path d="M690 380 C570 350 510 330 450 305"/>
    <path d="M250 480 C310 420 350 360 380 330"/>
    <path d="M560 470 C500 410 460 360 420 332"/>
  </g>
  <g font-family="Inter, sans-serif" font-weight="700" font-size="15" fill="#0d1b2a" text-anchor="middle">
    <g><circle cx="150" cy="130" r="30" fill="#ffffff" stroke="#1556ee" stroke-opacity="0.6" stroke-width="1.5" filter="url(#soft)"/><text x="150" y="135">amzn</text></g>
    <g><circle cx="660" cy="120" r="30" fill="#ffffff" stroke="#1556ee" stroke-opacity="0.6" stroke-width="1.5" filter="url(#soft)"/><text x="660" y="125">eBay</text></g>
    <g><circle cx="110" cy="360" r="30" fill="#ffffff" stroke="#1556ee" stroke-opacity="0.6" stroke-width="1.5" filter="url(#soft)"/><text x="110" y="365">W</text></g>
    <g><circle cx="690" cy="380" r="30" fill="#ffffff" stroke="#1556ee" stroke-opacity="0.6" stroke-width="1.5" filter="url(#soft)"/><text x="690" y="385">Tgt</text></g>
    <g><circle cx="250" cy="480" r="26" fill="#ffffff" stroke="#1556ee" stroke-opacity="0.6" stroke-width="1.5" filter="url(#soft)"/><text x="250" y="485">BB</text></g>
    <g><circle cx="560" cy="470" r="26" fill="#ffffff" stroke="#1556ee" stroke-opacity="0.6" stroke-width="1.5" filter="url(#soft)"/><text x="560" y="475">Neg</text></g>
  </g>
  <g filter="url(#soft)">
    <rect x="318" y="238" width="164" height="124" rx="16" fill="#ffffff" stroke="#1556ee" stroke-width="2.5"/>
    <rect x="342" y="262" width="46" height="62" rx="7" fill="#1556ee"/>
    <rect x="402" y="266" width="56" height="9" rx="4" fill="#a9c0f6"/>
    <rect x="402" y="284" width="44" height="9" rx="4" fill="#d3e0fb"/>
    <text x="402" y="320" font-family="Inter, sans-serif" font-weight="800" font-size="22" fill="#1556ee">$369</text>
  </g>
</svg>
